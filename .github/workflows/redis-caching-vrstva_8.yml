# CI/CD configuration for S-2205
# Managed by DevSecOps

name: performance-optimalizace
on:
  push:
    branches: [main, "feature/**"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run tests
        run: pytest tests/ -v --cov
      - name: Security scan
        run: bandit -r src/ -ll
