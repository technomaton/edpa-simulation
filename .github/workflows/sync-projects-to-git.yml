name: Sync GitHub Projects -> Git

on:
  schedule:
    - cron: '*/15 * * * *'  # Every 15 minutes
  workflow_dispatch:  # Manual trigger

permissions:
  contents: write
  projects: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install pyyaml

      - name: Sync Projects to Git
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/edpa_sync.py pull --commit

      - name: Push changes
        run: |
          git config user.name "EDPA Sync Bot"
          git config user.email "edpa-sync@kashealth.cz"
          git diff --quiet || (git add .edpa/ && git commit -m "sync: GitHub Projects -> backlog.yaml" && git push)
